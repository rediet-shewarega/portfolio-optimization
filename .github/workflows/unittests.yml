name: Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  basic-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check project structure
        run: |
          test -d data
          test -d notebooks
          test -d src
          test -d tests
          test -f README.md
          test -f requirements.txt

      - name: Import basic libraries
        run: |
          python -c "import pandas, numpy, matplotlib, yfinance, statsmodels, sklearn"